# AgentNexus Seed Relay — docker-compose
#
# 首次部署流程：
#   1. 复制并编辑 nginx 配置：
#        sed -i 's/YOUR_DOMAIN/relay.example.com/g' nginx/conf.d/relay.conf
#   2. 申请 SSL 证书（需先确保端口 80 未被占用）：
#        bash scripts/init-ssl.sh relay.example.com admin@example.com
#   3. 启动全部服务：
#        docker compose up -d
#
# 后续证书自动续期由 certbot 服务处理（每 12 小时检查一次）。

services:

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    # AOF + RDB 双重持久化，重启不丢数据
    command: redis-server --appendonly yes --save 60 1
    networks:
      - internal
    # 不对外暴露端口，只有 relay 容器可访问

  # ── Relay 应用 ────────────────────────────────────────────
  relay:
    build: .
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - internal
    # 不对外暴露端口，只有 nginx 可访问

  # ── Nginx 反向代理 ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/letsencrypt:ro
      - ./nginx/www:/var/www/certbot
    depends_on:
      - relay
    networks:
      - internal

  # ── Certbot 自动续期 ─────────────────────────────────────
  certbot:
    image: certbot/certbot
    restart: always
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - ./nginx/www:/var/www/certbot
    # 每 12 小时尝试续期（证书到期前 30 天自动续）
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'
    networks:
      - internal

networks:
  internal:

volumes:
  redis_data:
