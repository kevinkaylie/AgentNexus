# AgentNexus Seed Relay — docker-compose
#
# 两种部署模式，按实际情况选择：
#
# 模式 A（默认）：Cloudflare Tunnel
#   适合：服务器上已有其他服务占用 80/443（如 x-ui）
#   步骤：docker compose up -d
#         bash scripts/init-cloudflare.sh relay.example.com
#
# 模式 B：自带 nginx + Let's Encrypt
#   适合：服务器 80/443 空闲
#   步骤：bash scripts/init-ssl.sh relay.example.com admin@example.com
#         docker compose --profile nginx up -d

services:

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --save 60 1
    networks:
      - internal

  # ── Relay 应用 ────────────────────────────────────────────
  relay:
    build: .
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "127.0.0.1:9000:9000"   # 只绑本机，不对公网暴露；cloudflared 通过此端口转发
    depends_on:
      - redis
    networks:
      - internal

  # ── Cloudflare Tunnel（模式 A）────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}   # 从 Cloudflare Dashboard 获取
    depends_on:
      - relay
    networks:
      - internal

  # ── Nginx 反向代理（模式 B，profiles 控制，默认不启动）───
  nginx:
    image: nginx:alpine
    restart: always
    profiles: ["nginx"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/letsencrypt:ro
      - ./nginx/www:/var/www/certbot
    depends_on:
      - relay
    networks:
      - internal

  # ── Certbot 自动续期（模式 B）────────────────────────────
  certbot:
    image: certbot/certbot
    restart: always
    profiles: ["nginx"]
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - ./nginx/www:/var/www/certbot
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'
    networks:
      - internal

networks:
  internal:

volumes:
  redis_data:
